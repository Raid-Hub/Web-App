name: E2E

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    playwright:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Generate Prisma client
              run: bun prisma generate

            - name: Apply migrations (local SQLite schema for APP_ENV=local)
              run: bun prisma migrate deploy
              env:
                  APP_ENV: local

            - name: Seed E2E multi (pgcr_multi row + fixed instance ids from e2e/constants.ts)
              run: bun run scripts/e2e-seed.ts
              env:
                  APP_ENV: local

            - name: Install Playwright Chromium
              run: bunx playwright install chromium --with-deps

            - name: Run Playwright tests
              run: playwright test
              env:
                  CI: true
                  APP_ENV: local
                  RAIDHUB_API_KEY: ${{ secrets.RAIDHUB_API_KEY }}
